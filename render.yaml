services:
  - type: web
    name: dochadzka
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dochadzka-db
          property: connectionString

databases:
  - name: dochadzka-db
    databaseName: dochadzka
    user: dochadzka
